<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f4c81" />
    <title>A-share-LI 主板观察池</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">A-share-LI</p>
        <h1>主板 Serenity 观察池</h1>
      </div>
      <button id="installButton" class="ghost-button" hidden>安装</button>
    </header>

    <main>
      <section class="summary-band" aria-live="polite">
        <div>
          <span class="label">数据日期</span>
          <strong id="asOfDate">加载中</strong>
        </div>
        <div>
          <span class="label">股票数量</span>
          <strong id="poolCount">-</strong>
        </div>
        <div>
          <span class="label">全主板扫描</span>
          <strong id="universeScope">-</strong>
        </div>
        <div>
          <span class="label">当前判断</span>
          <strong id="overallSignal">-</strong>
        </div>
        <div>
          <span class="label">平均回访收益</span>
          <strong id="averageReturn">-</strong>
        </div>
      </section>

      <section class="notice">
        <strong>使用边界：</strong>
        这是研究观察池，不是自动买卖指令。回访收益用于检验模型，不代表未来收益。真正下单前，请复核实时行情、公告、财报和个人仓位。
      </section>

      <nav class="tabs" aria-label="筛选观察状态">
        <button class="tab active" data-filter="all">全部</button>
        <button class="tab" data-filter="buyable">可买入</button>
        <button class="tab" data-filter="watch">观察区</button>
        <button class="tab" data-filter="breakout">突破确认</button>
        <button class="tab" data-filter="wait">等回踩</button>
        <button class="tab" data-filter="avoid">不追高</button>
      </nav>

      <section id="stockList" class="stock-list"></section>

      <section class="review-panel">
        <div class="section-head">
          <div>
            <h2>回访中心</h2>
            <p>这里保留所有历史推荐，并按推荐后收益率从高到低排行。即使某只股票不在最新推荐池里，也会继续跟踪表现。</p>
          </div>
          <span id="reviewCount" class="section-badge">-</span>
        </div>
        <div id="reviewList" class="review-list"></div>
      </section>

      <section class="model-panel">
        <h2>模型思路</h2>
        <p id="modelDescription">长期趋势确认 → 产业链瓶颈 → 供需验证 → 低关注度/错定价 → 催化剂 → 估值重估。</p>
        <div id="sourceStatus" class="source-status"></div>
      </section>
    </main>

    <template id="stockCardTemplate">
      <article class="stock-card">
        <button class="card-head" type="button">
          <span>
            <strong class="stock-name"></strong>
            <em class="stock-code"></em>
          </span>
          <span class="status-pill"></span>
        </button>
        <div class="metrics">
          <div><span>收盘价</span><strong class="close-price"></strong></div>
          <div><span>买入信号</span><strong class="buy-signal"></strong></div>
          <div><span>可买价</span><strong class="buy-price"></strong></div>
          <div><span>资金流</span><strong class="fund-flow"></strong></div>
          <div><span>筹码</span><strong class="chip-status"></strong></div>
          <div><span>接入价</span><strong class="entry-price"></strong></div>
          <div><span>突破价</span><strong class="breakout-price"></strong></div>
          <div><span>观察区间</span><strong class="watch-zone"></strong></div>
          <div><span>不追高线</span><strong class="no-chase"></strong></div>
          <div><span>回访收益</span><strong class="tracking-return"></strong></div>
          <div><span>评分</span><strong class="score"></strong></div>
        </div>
        <div class="detail" hidden>
          <p class="logic"></p>
          <dl>
            <div><dt>产业链位置</dt><dd class="theme"></dd></div>
            <div><dt>第一层初筛</dt><dd class="layer-one"></dd></div>
            <div><dt>买入观察</dt><dd class="buy-detail"></dd></div>
            <div><dt>资金流动</dt><dd class="fund-detail"></dd></div>
            <div><dt>筹码结构</dt><dd class="chip-detail"></dd></div>
            <div><dt>接入纪律</dt><dd class="entry-detail"></dd></div>
            <div><dt>突破纪律</dt><dd class="breakout-detail"></dd></div>
            <div><dt>首次推荐</dt><dd class="first-recommend"></dd></div>
            <div><dt>回访表现</dt><dd class="tracking-detail"></dd></div>
            <div><dt>价格触发</dt><dd class="trigger"></dd></div>
            <div><dt>仓位提示</dt><dd class="position"></dd></div>
            <div><dt>主要催化</dt><dd class="catalysts"></dd></div>
            <div><dt>主要风险</dt><dd class="risks"></dd></div>
          </dl>
        </div>
      </article>
    </template>

    <template id="reviewRowTemplate">
      <article class="review-row">
        <div>
          <strong class="review-name"></strong>
          <em class="review-code"></em>
        </div>
        <div>
          <span>累计收益</span>
          <strong class="review-return"></strong>
        </div>
        <div>
          <span>首次推荐</span>
          <strong class="review-first"></strong>
        </div>
        <div>
          <span>状态</span>
          <strong class="review-status"></strong>
        </div>
      </article>
    </template>

    <script src="assets/app.js" type="module"></script>
  </body>
</html>
