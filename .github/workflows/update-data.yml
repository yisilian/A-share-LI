name: Update A-share pool

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "scripts/generate_pool.py"
      - "assets/**"
      - "index.html"
      - "docs/**"
      - "requirements.txt"
      - ".github/workflows/update-data.yml"
  schedule:
    # GitHub cron uses UTC. Primary slots map to Beijing time 10:00, 11:20, 13:30, 14:30, and 20:00.
    - cron: "0 2 * * 1-5"
    - cron: "20 3 * * 1-5"
    - cron: "30 5 * * 1-5"
    - cron: "30 6 * * 1-5"
    - cron: "0 12 * * 1-5"
    # Backup slots reduce the chance of a missed/delayed scheduled refresh.
    - cron: "8 2 * * 1-5"
    - cron: "28 3 * * 1-5"
    - cron: "38 5 * * 1-5"
    - cron: "38 6 * * 1-5"
    - cron: "8 12 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest main
        run: git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate latest pool
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: python scripts/generate_pool.py

      - name: Commit updated data
        run: |
          if [[ -n "$(git status --porcelain data)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data
            git commit -m "Update A-share pool data"
            git pull --rebase origin main
            git push
          else
            echo "No data changes."
          fi

      # GITHUB_TOKEN data commits do not trigger the separate Pages workflow,
      # so this job deploys the static app after each scheduled data refresh.
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy updated static app
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Retry deploying static app
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Fail if Pages deploy failed twice
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome != 'success'
        run: exit 1
